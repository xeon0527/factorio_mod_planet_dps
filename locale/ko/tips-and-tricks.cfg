[tips-and-tricks-item-description]
dps-tat_briefing=나우비스와 유사한 환경을 갖춘 것으로 보이는 황량한 행성입니다. 행성 자체는 생명체가 없다는 것 외에는 특별한 점이 없어보입니다만 표면에서 정체를 알 수 없는 막대한 수의 기계가 탐지됩니다...\n\n지표면의 지형이 매우 험준하므로 [item=cliff-explosives]을 챙기면 큰 도움이 될 것입니다.
dps-tat_dps-subcore=DPS 서브코어에게 어떤 수단으로든 데미지를 가하면 내부에 [item=dps-item_dps-credit_n]이 생성됩니다. 이 아이템은 투입기를 사용하여 꺼낼 수 있습니다.\nDPS 서브코어는 내부적으로 인벤토리 필터를 사용하므로 인벤토리 크기 부족으로 아이템 생성이 막히지 않습니다.
dps-tat_dorax=하늘에서 난데없이 떨어진 이 거인은 우리의 기술로 이해할 수 없는 수준의 내구력을 가지고 있는 것 같습니다. 일단 연구를 하려면 어떤 식으로든 분해를 해봐야 하는데 말이죠... 어떻게 해야 이 녀석을 연구할 수 있을까요?