[tips-and-tricks-item-description]
dps-tat_briefing=나우비스와 유사한 환경을 갖춘 것으로 보이는 황량한 행성입니다. 행성 자체는 특별한 점이 없어보입니다만 표면에서 정체를 알 수 없는 막대한 수의 기계가 탐지됩니다...\n\n지표면의 지형이 매우 험준하므로 [item=cliff-explosives]을 챙기면 큰 도움이 될 것입니다.
dps-tat_promethium-subcore=프로메튬 서브코어에게 어떤 수단으로든 데미지를 가하면 내부에 [item=dps-item_subcore-scrap]이 생성됩니다. 이 아이템은 투입기를 사용하여 꺼낼 수 있습니다.
dps-tat_promethium-subcore-item-graph=가로 축은 Damage Per Second, 세로 축은 각 아이템의 생성량입니다.\n[font=default-large-bold][color=#FFFF00]■ : [/color][/font][item=dps-item_subcore-scrap]\n[font=default-large-bold][color=#E97132]■ : [/color][/font][item=heavy-oil-barrel]\n[font=default-large-bold][color=#0F9ED5]■ : [/color][/font][item=coal]