[mod-name]
planet-dps=○ 행성 DPS

[mod-description]
planet-dps=이 행성은 과거 인류가 거주를 위해 테라포밍을 진행하고 있었지만 모종의 사건 이후로 테라포밍이 중단되고 아주 오랜 기간 동안 방치 되었습니다. 결국 뛰어난 기후와 환경을 갖추고 있지만 어떠한 생명의 흔적도 찾아볼 수 없는 기괴한 행성이 되었습니다. 그런데 테라포밍을 진행하던 사람들이 이 행성을 정말로 거주용으로 사용할 생각은 아니였던 것 같습니다...

