[system-message]
dorax-appers-prefix=[font=default-large-bold][color=red][[img=virtual-signal.signal-alert] 심각][/color][/font] 
dorax-appers-1-1=[font=default-large-bold]위험! 행성 DPS 상공에서 식별할 수 없는 개체가 낙하하고 있습니다.[/font]
dorax-appers-1-2=질량은 약 257톤이며 낙하 속도는 약 28,000km/h으로 예측 됩니다.
dorax-appers-1-3=충돌 예상 시간 : 60초
dorax-appers-t3300-1=[font=default-large-bold]긴급 시뮬레이션 결과, 낙하 지점에 막대한 피해가 예상됩니다. 즉시 대피하십시오.[/font]
dorax-appers-t3300-2=낙하 예상 지점
dorax-appers-t3300-3=충돌까지 55초 남았습니다.
dorax-appers-t1800-1=충돌까지 30초 남았습니다.
dorax-appers-t1200-1=충돌까지 20초 남았습니다.
dorax-appers-t600-1=충돌까지 10초 남았습니다.
dorax-appers-t300-1=충돌까지 5초 남았습니다.
dorax-appers-t240-1=충돌까지 4초 남았습니다.
dorax-appers-t180-1=충돌까지 3초 남았습니다.
dorax-appers-t120-1=충돌까지 2초 남았습니다.
dorax-appers-t60-1=충돌까지 1초 남았습니다.
dorax-appers-2-1=정체불명의 기계가 주변을 초토화시키며 지표면으로 추락했습니다... 그럼에도 사소한 상처조차 입지 않은 것 같습니다.
dorax-appers-2-2=당신은 갑자기 이 기계를 상대로 분노가 차오름을 느꼈습니다. 마치 주변의 모든 생명체를 도발하는 능력이 있는 것 같습니다.
dorax-appers-2-3=그제서야 왜 이 행성에 생명체가 없는지 깨달았습니다. 모든 동물, 심지어 식물과 미생물조차 이 기계를 공격하는데에 모든 것을 바친 것입니다.
dorax-appers-2-4=분노와 공포가 당신을 덮치지만, 위험을 감수해서라도 이 기계를 분해하고 연구하여 얻을 수 있는 것이 있을지도 모릅니다...