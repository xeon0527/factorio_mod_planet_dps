[entity-description]
dps-building_armory=무기 체계를 사용하기 위한 각종 아이템들을 효과적으로 생산할 수 있는 시설입니다.
dps-building_dps-credit-translator=DPS 크레딧을 기초 자원으로 변환하는 시설입니다.
dps-building_dps-supercomputer=DPS 행성의 환경을 최대한 활용할 수 있도록 설계된 슈퍼컴퓨터 입니다. 이 행성의 비밀을 밝혀내기 위해 반드시 필요합니다.
dps-building_dps-subcore=프로메튬의 시공간 탄력성을 응용한 실험용 관측기인 것 같습니다. 이 기계는 어떤 방법으로 파괴해도 즉시 시간을 되감아 손상을 복구합니다. 덕분에 기계를 공격하여 자원을 무한히 획득할 수 있게 되었습니다.
dps-building_dps-equipment-enhancer=DPS 장비를 비용을 지불하여 다음 단계로 강화합니다. 물론 비용이 공짜는 아닙니다.

dps-turret_supersonic-grenade-launcher=초음속으로 유탄을 발사하는 포탑입니다. 강력한 물리 데미지와 폭발 데미지를 동시에 가할 수 있습니다. 이 똑똑한 포탑은 아군 피해를 가하지 않도록 정밀한 조준 능력도 갖추고 있습니다.
dps-turret_apfsds-cannon=날개안정분리철갑탄을 극초음속으로 발사하는 거대한 대포입니다. 비록 아주 무식하고 원시적이지만 그럼에도 D.O.R.A.X의 무시무시한 장갑에 흠집을 낼 수 있습니다.

dps-resource_dps-scrap=DPS 행성에 남아있는 우리 문명의 희귀한 흔적입니다. 유용한 자원으로 재활용 할 수 있습니다.

dps-turret_apfsds-machine-gun_1=기존의 APFSDS 대포의 크기를 줄이고 포신을 늘려 빠른 발사속도를 확보했을 뿐만 아니라 강화하여 추가 데미지를 획득할 수 있게 되었습니다. 이제 D.O.R.A.X의 껍질을 조금씩 벗겨볼까요?
dps-turret_apfsds-machine-gun_2=기존의 APFSDS 대포의 크기를 줄이고 포신을 늘려 빠른 발사속도를 확보했을 뿐만 아니라 강화하여 추가 데미지를 획득할 수 있게 되었습니다. 이제 D.O.R.A.X의 껍질을 조금씩 벗겨볼까요?
dps-turret_apfsds-machine-gun_3=기존의 APFSDS 대포의 크기를 줄이고 포신을 늘려 빠른 발사속도를 확보했을 뿐만 아니라 강화하여 추가 데미지를 획득할 수 있게 되었습니다. 이제 D.O.R.A.X의 껍질을 조금씩 벗겨볼까요?
