[entity-description]
dps-building_dps-credit-translator=DPS 크레딧을 기초 자원으로 변환하는 시설입니다.
dps-building_dps-supercomputer=DPS 행성의 환경을 최대한 활용할 수 있도록 설계된 슈퍼컴퓨터 입니다. 이 행성의 비밀을 밝혀내기 위해 반드시 필요합니다.
dps-building_dps-subcore=프로메튬의 시공간 탄력성을 응용한 실험용 관측기인 것 같습니다. 이 기계는 어떤 방법으로 파괴해도 즉시 시간을 되감아 손상을 복구합니다. 덕분에 기계를 공격하여 자원을 무한히 획득할 수 있게 되었습니다.
dps-turret_supersonic-grenade-launcher=초음속으로 유탄을 발사하는 포탑입니다. 강력한 물리 데미지와 폭발 데미지를 동시에 가할 수 있습니다.

dps-resource_dps-scrap=DPS 행성에 남아있는 우리 문명의 희귀한 흔적입니다. 유용한 자원으로 재활용 할 수 있습니다.