[entity-description]
dps-building_dps-supercomputer=DPS 행성의 환경을 최대한 활용할 수 있도록 설계된 슈퍼컴퓨터 입니다. 이 행성의 비밀을 밝혀내기 위해 반드시 필요합니다.
dps-building_promethium-subcore=프로메튬의 시공간 탄력성을 응용한 실험용 기계입니다. 이 기계는 어떤 방법으로 파괴해도 즉시 시간을 되감아 손상을 복구합니다. 덕분에 기계를 공격하여 고철을 무한히 획득할 수 있게 되었습니다.