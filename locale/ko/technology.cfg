[technology-description]
dps-tech_planet-discovery-dps=나우비스와 유사한 환경을 갖춘 것으로 보이는 황량한 행성입니다. 행성 자체는 특별한 점이 없어보입니다만 표면에서 정체를 알 수 없는 막대한 수의 기계가 탐지됩니다...
dps-tech_dps-scrap-recycling=DPS 고철을 재활용하여 유용한 자원을 획득할 수 있습니다.\n\n안심하세요. 풀고라와 DPS 행성은 분명히 다를겁니다. 아마도요.
dps-tech_dps-credit-translator=DPS 크레딧은 DPS 서브코어를 공격하여 얻을 수 있는 모든 자원과 지식, 에너지를 통합한 재화입니다. DPS 크레딧 번역기는 DPS 크레딧을 유용한 자원으로 변환할 수 있는 시설입니다.\n\n세상에는 이미 우리가 감당할 수 없을 만큼 정보가 넘쳐납니다. 복잡한건 싫어요! 단순한게 최고예요.
dps-tech_dps-credit-translator-trigger=[entity=dps-building_dps-subcore]를 공격하세요.
dps-tech_dps-credit-exchange=대량의 DPS 크레딧을 더 큰 단위로 압축하고 정리할 수 있습니다. 금융은 정말 복잡하기 짝이 없어요. 최근에 주식을 구매했다가 큰 돈을 잃었답니다. 울고 싶어요.
dps-tech_dps-credit-exchange-trigger=한 [entity=dps-building_dps-subcore]에 초당 1,000 이상의 데미지를 입히세요.
dps-tech_dps-data-pack=이 폭력 밖에 남지 않은 행성에서 살아남기 위해서는 더 큰 폭력이 필요합니다.
dps-tech_dps-data-pack-trigger=한 [entity=dps-building_dps-subcore]에 초당 5,000 이상의 데미지를 입히세요.

dps-tech_basic-dps-engineering=DPS에 대한 기초적인 이해를 통해 모든 유형의 데미지를 100% 강화합니다. DPS에 대해 뭘 이해하냐고요? 곤란한 질문은 사양하겠습니다.
dps-tech_cheap-magazine=더 다양한 자원으로 탄창을 생산할 수 있게 됩니다. 어쩌면 더 유용한 용도가 있을지도 모릅니다...

dps-tech_discovery-of-dorax=테라포밍이 진행중이던 행성에 아무 생명체도 없다는 것은 분명히 외부의 개입이 있었음을 암시합니다.
dps-tech_discovery-of-dorax-trigger=이 행성을 죽음의 땅으로 바꾼 원흉을 찾아내십시오.
dps-tech_supersonic-grenade-launcher=유탄을 초음속으로 발사하여 강력한 물리 데미지와 폭발 데미지를 가할 수 있는 가벼운 터렛입니다.

dps-tech_apfsds-cannon=D.O.R.A.X를 어떻게 타격해야 할지 고민만해서는 답이 나오지 않습니다. 일단 존나게 큰 대포를 존나게 강하게 갈겨보는겁니다. 그러면 어떻게든 되겠죠.

dps-tech_dps-equipment-enhancer=DPS 행성 내의 각종 장비를 강화할 수 있습니다. 기술을 갈고 닦아서 더 높은 DPS를 얻는 것만이 우리의 목표입니다. D.O.R.A.X를 더 아프게 해보자구요.
dps-tech_apfsds-shell-enhancement-chance=APFSDS 포탄의 강화 확률을 레벨당 1%씩 증가시킵니다. 추가 확률에 상응하는 수준의 생산성이 레시피에 추가되는 방식으로 적용됩니다.
dps-tech_apfsds-shell-productivity=APFSDS 포탄의 생산성을 개선합니다.
dps-tech_apfsds-shell-gun-speed=APFSDS 포탄의 발사 속도를 개선합니다.
dps-tech_apfsds-shell-damage=APFSDS 포탄의 피해를 증가시킵니다.

dps-tech_advanced-dps-engineering=D.O.R.A.X를 연구하여 얻은 지식으로 모든 무기 체계의 데미지를 크게 상승시킵니다. 고된 연구 끝에 드디어 DPS에 대한 궁극적인 핵심 원리를 알아낼 수 있었습니다. 그것은 바로 세게 때릴수록 더 아프다는 것입니다.
dps-tech_advanced-dps-engineering-trigger=D.O.R.A.X에게 초당 1,000 이상의 데미지를 입히세요.
dps-tech_armory=무기 체계를 사용하기 위한 각종 아이템들을 효과적으로 생산할 수 있는 시설입니다. 전투에서 가장 중요한 것은 보급 아니겠습니까? 군인들은 식량과 총알이 있어야 싸울 수 있고, 포탑은 기름과 총알이 있어야 싸울 수 있죠.

dps-tech_apfsds-machine-gun=기존의 APFSDS 대포의 크기를 줄이고 포신을 늘려 빠른 발사속도를 확보했을 뿐만 아니라 강화하여 추가 데미지를 획득할 수 있게 되었습니다. 포탑 마저 강화지옥에 참전한 것은 정말로 좋은 소식일까요?
dps-tech_advanced-apfsds-shell=추가적인 APFSDS 포탄 강화 단계를 해금합니다. 비용은 상당하지만 그만한 가치가 있을거라고 믿으시기 바랍니다.
dps-tech_advanced-apfsds-shell-damage=APFSDS 포탄의 데미지를 레벨당 20% 강화합니다.
dps-tech_advanced-apfsds-shell-enhancement-chance=6단계부터 10단계까지의 APFSDS 포탄들의 강화 확률을 레벨당 1% 증가시킵니다.
dps-tech_advanced-apfsds-shell-enhancement-chance_effects=Lv 6 ~ Lv 10 APFSDS 포탄 강화 확률 +1%p
dps-tech_advanced-apfsds-shell-destruction-protection=강화를 실패했을 때 아이템을 다시 되돌려 받을 수 있는 확률을 추가합니다. 레벨당 5%의 보호 확률이 추가됩니다.
dps-tech_advanced-apfsds-shell-destruction-protection_effects=Lv 6 ~ Lv 10 APFSDS 포탄 강화 보호 확률 +5%p
dps-tech_apfsds-machine-gun-enhancement-chance=APFSDS 기관포의 강화 확률을 레벨당 1% 증가시킵니다.
dps-tech_apfsds-machine-gun-enhancement-chance_effects=APFSDS 기관포 강화 확률 +1%p
dps-tech_apfsds-machine-gun-destruction-protection=강화를 실패했을 때 아이템을 다시 되돌려 받을 수 있는 확률을 추가합니다. 레벨당 5%의 보호 확률이 추가됩니다.
dps-tech_apfsds-machine-gun-destruction-protection_effects=APFSDS 기관포 강화 보호 확률 +5%p