[technology-description]
dps-tech_planet-discovery-dps=나우비스와 유사한 환경을 갖춘 것으로 보이는 황량한 행성입니다. 행성 자체는 특별한 점이 없어보입니다만 표면에서 정체를 알 수 없는 막대한 수의 기계가 탐지됩니다...
dps-tech_subcore-scrap-recycling=서브코어 고철을 재활용하여 기초자원을 얻을 수 있게 됩니다. 그럼 재활용 할 서브코어 고철은 어떻게 획득할까요? 가끔은 주먹으로 쉽게 해결할 수 있는 일도 있는 법이죠.
dps-tech_subcore-scrap-recycling-trigger=[entity=dps-building_promethium-subcore]를 공격하세요.
dps-tech_cheap-magazine=서브코어 고철을 재활용하여 얻은 자원을 최대한으로 활용하여 탄창을 생산할 수 있습니다. 원래 처음은 이렇게 밑바닥에서 고생스럽게 시작하는 겁니다.
dps-tech_cheap-magazine-trigger=[entity=dps-building_promethium-subcore]에 초당 100 이상의 데미지를 입히세요.
dps-tech_dps-science-pack=이 폭력 밖에 남지 않은 행성에서 살아남기 위해서는 더 큰 폭력이 필요합니다.
dps-tech_basic-dps-engineering=모든 유형의 데미지를 레벨당 1% 강화합니다. 이것저것 챙기느라 효과는 그다지 좋지 않은 것 같습니다.
dps-tech_discovery-of-dorax=테라포밍이 진행중이던 행성에 아무 생명체도 없다는 것은 분명히 외부의 개입이 있었음을 암시합니다.
dps-tech_discovery-of-dorax-trigger=이 행성을 죽음의 땅으로 바꾼 원흉을 찾아내십시오.
dps-tech_dps-supercomputer=이 황량한 행성에서 뭐라도 해보려면 일단 컴퓨터라도 좋은 걸로 장만해야 할 것 같습니다.