[item-description]
dps-item_dps-credit-n=DPS 크레딧은 DPS 서브코어에서 수집된 각종 자원과 지식, 에너지를 하나의 개념으로 통합한 재화입니다.
dps-item_dps-credit-k=1,000개의 DPS 크레딧이 압축 되어 있습니다.
dps-item_dps-credit-m=1,000,000개의 DPS 크레딧이 압축 되어 있습니다.
dps-item_dps-credit-g=1,000,000,000개의 DPS 크레딧이 압축 되어 있습니다.
dps-item_dps-credit-t=1,000,000,000,000개의 DPS 크레딧이 압축 되어 있습니다.

dps-resource_dps-scrap=DPS 행성에 남아있는 우리 문명의 희귀한 흔적입니다. 유용한 자원으로 재활용 할 수 있습니다.
dps-item_dps-data-pack=DPS에 대한 궁극적인 이해의 첫걸음입니다.

dps-item_dorax-fragment=D.O.R.A.X로부터 떨어져 나온 파편입니다. 공학적으로 상당히 흥미로운 성질을 띄는 것 같습니다.
dps-item_dorax-component=D.O.R.A.X로부터 떨어져 나온 어떤 부품 같습니다. 드디어 뭔가 연구할만한 가치가 있는 것이 나타났군요.

dps-ammo_supersonic-grenade=초음속 유탄 발사기의 탄약입니다.
dps-ammo_apfsds-shell-1=APFSDS는 날개안정분리철갑탄을 의미합니다. 이 포탄은 아주 큰 운동 에너지를 매우 좁은 영역에 집중시켜 엄청난 관통력을 낼 수 있습니다.
