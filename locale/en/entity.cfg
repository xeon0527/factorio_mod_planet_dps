[entity-description]
dps-entity-building_promethium-subcore=This is an experimental machine that applies Promethium’s spacetime elasticity. No matter how it is destroyed, it instantly rewinds time to repair any damage. As a result, it became possible to attack the machine and obtain scrap infinitely.