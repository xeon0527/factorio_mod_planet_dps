dps-building_dps-supercomputer=A supercomputer designed to make full use of the Planet DPS environment. It is essential for uncovering the secrets of this planet.
dps-building_promethium-subcore=This is an experimental machine that applies Promethium’s spacetime elasticity. No matter how it is destroyed, it instantly rewinds time to repair any damage. As a result, it became possible to attack the machine and obtain scrap infinitely.