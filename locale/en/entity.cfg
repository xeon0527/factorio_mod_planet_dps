[entity-description]
dps-building_armory=A facility for efficiently producing the various items needed to support your weapon systems.
dps-building_dps-credit-translator=Converts DPS Credits into basic resources.
dps-building_dps-supercomputer=A supercomputer designed to make full use of the Planet DPS environment. It is essential for uncovering the secrets of this planet.
dps-building_dps-subcore=It appears to be an experimental observation device that harnesses the spacetime elasticity of Promethium. No matter how it is damaged, it immediately rewinds time to repair itself. As a result, attacking the device allows you to harvest resources indefinitely.
dps-building_dps-equipment-enhancer=Upgrades DPS equipment to the next tier for a price. Of course, it won't be cheap.

dps-turret_supersonic-grenade-launcher=A turret that fires grenades at supersonic speeds, dealing devastating kinetic and explosive damage at the same time. This smart turret is also equipped with precision targeting, ensuring it never inflicts friendly fire.
dps-turret_apfsds-cannon=It is a massive cannon that fires Armor-Piercing Fin-Stabilized Discarding Sabot rounds at hypersonic speeds. Although it is crude and primitive by all means, it can still leave a scratch on D.O.R.A.X's terrifying armor.

dps-resource_dps-scrap=Rare remnants of our civilization left behind on the DPS planet. They can be recycled into useful resources.