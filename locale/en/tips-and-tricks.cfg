dps-tat_briefing=A desolate planet that appears to have an environment similar to Nauvis. The planet itself does not seem particularly unusual, but an enormous number of unidentified machines have been detected on its surface...\n\nThe terrain on the surface is extremely rugged, so bringing [item=cliff-explosives] will be a great help.