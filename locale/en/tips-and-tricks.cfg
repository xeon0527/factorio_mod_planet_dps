[tips-and-tricks-item-description]
dps-tat_briefing=A barren planet that appears to have an environment similar to Nauvis. At first glance, there's nothing particularly unusual about it besides the complete absence of life. However, an enormous number of unidentified machines have been detected across its surface...\n\nThe terrain is extremely rugged, so bringing some [item=cliff-explosives] will make your expedition much easier.
dps-tat_dps-subcore=Dealing damage to a DPS Subcore by any means will generate [item=dps-item_dps-credit_n] inside it. These items can be extracted using inserters.\n\nThe DPS Subcore uses internal inventory filters, so item generation will never be blocked by a lack of inventory space.
dps-tat_dorax=This giant that fell from the sky seems to possess durability far beyond anything our technology can comprehend. To study it, we'll have to take it apart somehow first... But how are we supposed to research something like this?