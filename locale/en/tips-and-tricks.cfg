[tips-and-tricks-item-description]
dps-tat_briefing=A desolate planet that appears to have an environment similar to Nauvis. The planet itself does not seem particularly unusual, but an enormous number of unidentified machines have been detected on its surface...\n\nThe terrain on the surface is extremely rugged, so bringing [item=cliff-explosives] will be a great help.
dps-tat_promethium-subcore=Dealing damage to a Promethium Subcore by any means will generate [item=dps-item_subcore-scrap] inside it. This item can be extracted using inserters.\nThe Promethium Subcore internally uses 20 filtered inventory slots for each item type, preventing item production from being blocked due to insufficient inventory space.
dps-tat_promethium-subcore-item-graph=The horizontal axis represents Damage Per Second (DPS), and the vertical axis represents the production rate of each item per second.\n[font=default-large-bold][color=#FFFF00]■ : [/color][/font][item=dps-item_subcore-scrap]\n[font=default-large-bold][color=#E97132]■ : [/color][/font][item=heavy-oil-barrel]\n[font=default-large-bold][color=#0F9ED5]■ : [/color][/font][item=coal]