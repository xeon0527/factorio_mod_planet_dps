dorax-appers-2-1=The unidentified machine crashed onto the planet’s surface, devastating everything around it... and yet, it does not appear to have suffered even the slightest damage.
dorax-appers-2-2=You suddenly feel an overwhelming surge of anger directed toward this machine. It seems to possess some kind of ability that provokes every living creature around it.
dorax-appers-2-3=Only then do you realize why there is no life on this planet. Every animal — even plants and microorganisms — devoted everything they had to attacking this machine.
dorax-appers-2-4=Rage and fear wash over you, but even so, there may be something to gain by taking the risk to dismantle and study this machine...