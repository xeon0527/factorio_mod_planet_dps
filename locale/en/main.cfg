[mod-name]
planet-dps=○ Planet DPS

[mod-description]
planet-dps=This planet was once being terraformed by humanity for habitation, but after some unknown incident, the terraforming was halted and it was abandoned for a very long time. In the end, it became a strange world—one with an excellent climate and environment, yet completely devoid of any traces of life. However, it seems that the people who were carrying out the terraforming had some purpose for this planet beyond simply making it habitable...

