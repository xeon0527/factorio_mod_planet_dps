[technology-description]
dps-tech_planet-discovery-dps=A desolate planet that appears to have an environment similar to Nauvis. The planet itself does not seem particularly remarkable, but an enormous number of unidentified machines have been detected on its surface...
dps-tech_subcore-scrap-recycling=Allows Subcore Scrap to be recycled into basic resources. But how do you obtain Subcore Scrap in the first place? Sometimes, the simplest solution is to solve the problem with your own fists.
dps-tech_subcore-scrap-recycling-trigger=Attack a [entity=dps-building_promethium-subcore].
dps-tech_cheap-magazine=You can now produce magazines by making the most of the resources recovered from recycled Subcore Scrap. Everyone has to start from rock bottom somehow.
dps-tech_cheap-magazine-trigger=Deal more than 100 DPS to a [entity=dps-building_promethium-subcore].
dps-tech_dps-science-pack=To survive on this planet where only violence remains, you will need even greater violence.
dps-tech_basic-dps-engineering=Increases all damage types by 1% per level. The effect does not seem particularly impressive, probably because it tries to improve a little bit of everything.
dps-tech_discovery-of-dorax=The complete absence of life on a planet that was undergoing terraforming strongly suggests external interference.
dps-tech_discovery-of-dorax-trigger=Find the entity responsible for turning this planet into a land of death.
dps-tech_dps-supercomputer=If you're going to accomplish anything on this barren planet, you'll probably need a better computer first.
dps-tech_supersonic-grenade-launcher=To effectively damage D.O.R.A.X, a powerful grenade launcher has been developed by combining coilgun technology with the power of Promethium Subcore.