[technology-description]
dps-tech_planet-discovery-dps=A desolate planet that appears to have an environment similar to Nauvis. The planet itself does not seem particularly remarkable, but an enormous number of unidentified machines have been detected on its surface...
dps-tech_subcore-scrap-recycling=Allows Subcore Scrap to be recycled into basic resources. But how do you obtain Subcore Scrap in the first place? Sometimes, the simplest solution is to solve the problem with your own fists.
dps-tech_subcore-scrap-recycling-trigger=Attack a [entity=dps-entity-building_promethium-subcore].
dps-tech_cheap-magazine=You can now produce magazines by making the most of the resources recovered from recycled Subcore Scrap. Everyone has to start from rock bottom somehow.
dps-tech_cheap-magazine-trigger=Deal more than 100 DPS to a [entity=dps-entity-building_promethium-subcore].
dps-tech_dps-science-pack=To survive on this planet where only violence remains, you will need even greater violence.
dps-tech_basic-dps-upgrade=Increases all damage types by 1% per level. The effect does not seem particularly impressive, probably because it tries to improve a little bit of everything.