[technology-description]
dps-tech_planet-discovery-dps=A desolate planet that appears to have an environment similar to Nauvis. The planet itself does not seem particularly remarkable, but an enormous number of unidentified machines have been detected on its surface...

dps-tech_dps-scrap-recycling=Recycle DPS Scrap into useful resources.\n\nDon't worry. Fulgora and the DPS planet are definitely different. Probably.
dps-tech_dps-credit-translator=DPS Credits are a unified currency representing every resource, piece of knowledge, and unit of energy obtained by attacking DPS Subcores. The DPS Credit Translator converts DPS Credits into useful resources.\n\nThe world is already overflowing with more information than we can handle. I like to keep things simple!
dps-tech_dps-credit-translator-trigger=Attack a [entity=dps-building_dps-subcore].
dps-tech_dps-credit-exchange=Compress large amounts of DPS Credits into higher denominations for easier storage and organization. Finance is unbelievably complicated. I recently bought some stocks and lost a fortune. I feel like crying.
dps-tech_dps-credit-exchange-trigger=Deal more than 1,000 damage per second to a single [entity=dps-building_dps-subcore].
dps-tech_dps-data-pack=To survive on this planet, where nothing but violence remains, you'll need even greater violence.
dps-tech_dps-data-pack-trigger=Deal more than 5,000 damage per second to a single [entity=dps-building_dps-subcore].

dps-tech_basic-dps-engineering=Gain a basic understanding of DPS to increase all types of damage by 100%. What exactly are we understanding about DPS? I'd rather not answer that.
dps-tech_cheap-magazine=Allows magazines to be produced from a wider variety of resources. They might even prove useful for something else...

dps-tech_discovery-of-dorax=The complete absence of life on a planet that was undergoing terraforming strongly suggests external interference.
dps-tech_discovery-of-dorax-trigger=Find the entity responsible for turning this planet into a land of death.
dps-tech_supersonic-grenade-launcher=A lightweight turret that fires grenades at supersonic speeds, dealing heavy impact and explosive damage.

dps-tech_apfsds-cannon=You won't figure out how to take down D.O.R.A.X by overthinking it. Just build a fucking huge cannon and blast the living hell out of it. It'll probably work somehow.

dps-tech_dps-equipment-enhancer=Allows you to upgrade various equipment on Planet DPS. Our only goal is to keep refining our technology and achieve even higher DPS. Let's make D.O.R.A.X hurt even more.
dps-tech_apfsds-shell-enhancement-chance=Increases the enhancement chance of APFSDS shells by 1% per research level. This is implemented by adding an equivalent amount of productivity to the recipe, corresponding to the additional chance.
dps-tech_apfsds-shell-productivity=Improves the productivity of APFSDS shell production.
dps-tech_apfsds-shell-gun-speed=Improves the firing speed of APFSDS shells.
dps-tech_apfsds-shell-damage=Increases the damage dealt by APFSDS shells.

dps-tech_advanced-dps-engineering=The knowledge gained from studying D.O.R.A.X greatly increases the damage of all weapon systems. After countless hours of research, we've finally uncovered the ultimate secret behind DPS: the harder you hit, the more it hurts.
dps-tech_advanced-dps-engineering-trigger=Deal more than 1,000 DPS to D.O.R.A.X.
dps-tech_armory=A facility for efficiently producing the various items needed to support your weapon systems. After all, logistics win wars. Soldiers can't fight without food and ammunition, and turrets can't fight without oil and ammo.

dps-tech_apfsds-machine-gun=The original APFSDS cannon has been downsized and fitted with a longer barrel, greatly increasing its rate of fire. Better yet, it can now be enhanced to gain even more damage. But is it really good news that even turrets have joined the enhancement grind?
dps-tech_advanced-apfsds-shell=Unlocks additional enhancement levels for APFSDS shells. The cost is considerable, but surely the rewards will be worth it.
dps-tech_advanced-apfsds-shell-damage=Increases the damage of APFSDS shells.
dps-tech_advanced-apfsds-shell-enhancement-chance=Increases the enhancement success chance of Level 6 to Level 10 APFSDS shells. The probability bonus is applied through the productivity bonus system.
dps-tech_advanced-apfsds-shell-enhancement-chance_effects=Level 6–10 APFSDS Shell Enhancement Chance +1%p
dps-tech_advanced-apfsds-shell-destruction-protection=Adds a chance to recover the item when an enhancement fails. Protected items are automatically re-entered into the enhancement process. The probability bonus is applied through the productivity bonus system.
dps-tech_advanced-apfsds-shell-destruction-protection_effects=Level 6–10 APFSDS Shell Enhancement Protection Chance +5%p
dps-tech_apfsds-machine-gun-enhancement-chance=Increases the enhancement success chance of the APFSDS Machine Gun. The probability bonus is applied through the productivity bonus system.
dps-tech_apfsds-machine-gun-enhancement-chance_effects=APFSDS Machine Gun Enhancement Chance +1%p
dps-tech_apfsds-machine-gun-destruction-protection=Adds a chance to recover the item when an enhancement fails. Protected items are automatically re-entered into the enhancement process. The probability bonus is applied through the productivity bonus system.
dps-tech_apfsds-machine-gun-destruction-protection_effects=APFSDS Machine Gun Enhancement Protection Chance +5%p